# ZMK Studio (live keymap editing without reflashing)
CONFIG_ZMK_STUDIO=y

# Encoders (rotary knob)
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Sleep after 30 minutes idle
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# Disable RGB underglow
CONFIG_ZMK_RGB_UNDERGLOW=n
CONFIG_WS2812_STRIP=n

# Disable external power (often powers LEDs or OLEDs)
CONFIG_ZMK_EXT_POWER=n

# Pointing device / mouse layer support
CONFIG_ZMK_POINTING=y

# Allow multiple combos on the same key (thumb cluster uses many)
CONFIG_ZMK_COMBO_MAX_COMBOS_PER_KEY=16
