# Encoders (rotary knob)
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Sleep after 30 minutes idle
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# Temporary: clear bonds on boot to force fresh split pairing
# Remove this after left and right successfully pair
CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=y

# Optional: OLED display (uncomment if you have one)
# CONFIG_ZMK_DISPLAY=y
